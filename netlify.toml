[build]
  base = "frontend"
  command = "npm run build"
  publish = "dist"

# Proxy /api requests to the backend on Render
[[redirects]]
  from = "/api/*"
  to = "https://gs-associates-backend.onrender.com/api/:splat"
  status = 200
  force = true

# SPA Routing Fallback (Prevents 404 on refresh)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
